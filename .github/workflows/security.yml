name: Security and quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Pin third-party actions to immutable commits, not mutable tags.
      # actions/checkout v4.2.2
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
          # scripts/scan-secrets.mjs scans git history (`git log --all -p`);
          # a shallow clone would make that scan a no-op.
          fetch-depth: 0
      # actions/setup-node v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      # --ignore-scripts blocks a compromised dependency's postinstall from
      # running in CI. If a real dependency needs a postinstall step, remove
      # this flag deliberately and say why in this comment.
      - name: Clean reproducible install
        run: npm ci --ignore-scripts
      - name: Lint, typecheck, build, test, dependency audit, secret scan
        run: npm run verify
